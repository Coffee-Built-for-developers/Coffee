<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Coffee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="app" id="app">
  <div class="screens-wrapper" id="screensWrapper">

    <!-- Main screen -->
    <div class="screen" id="screenMain">

      <header class="header">
        <div class="logo">
          <div class="logo-cup">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
              <path d="M17 8h1a4 4 0 0 1 0 8h-1" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" stroke="currentColor" stroke-width="1.8"/>
              <path d="M6 2v2M10 2v2M14 2v2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
          <span class="logo-text">Coffee</span>
        </div>
        <label class="toggle" aria-label="Enable Coffee">
          <input type="checkbox" id="toggleInput" />
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </header>

      <div class="hero">
        <div class="status-pill" id="statusPill">
          <span class="pulse-ring"></span>
          <span class="status-dot" id="statusDot"></span>
          <span class="status-text" id="statusText">Protecting</span>
        </div>
        <p class="hero-sub" id="heroParagraph">All image uploads are being cleaned</p>
      </div>

      <div class="counter-row">
        <div class="counter-card">
          <div class="counter-val" id="cleanCount">0</div>
          <div class="counter-lbl">Images cleaned</div>
        </div>
        <button class="icon-btn" id="historyBtn" title="View history">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="1.8"/>
            <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <button class="icon-btn" id="resetBtn" title="Reset counter">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none">
            <path d="M3 12a9 9 0 1 0 3-6.7L3 8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M3 3v5h5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>

      <div class="badges">
        <div class="badge"><span class="badge-dot gps"></span>GPS</div>
        <div class="badge"><span class="badge-dot exif"></span>EXIF</div>
        <div class="badge"><span class="badge-dot date"></span>Date</div>
        <div class="badge"><span class="badge-dot device"></span>Device</div>
        <div class="badge"><span class="badge-dot thumb"></span>Thumbnail</div>
      </div>

      <footer class="footer">
        File inputs &amp; drag-and-drop · JPEG · PNG · WebP
      </footer>
    </div>

    <!-- History screen -->
    <div class="screen" id="screenHistory">
      <header class="header">
        <button class="back-btn" id="backBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M19 12H5M12 5l-7 7 7 7" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </button>
        <span class="screen-title">History</span>
        <button class="text-btn" id="clearHistoryBtn">Clear</button>
      </header>

      <div class="history-list" id="historyList">
        <div class="empty-state" id="emptyState">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" opacity="0.3">
            <path d="M17 8h1a4 4 0 0 1 0 8h-1" stroke="currentColor" stroke-width="1.5"/>
            <path d="M3 8h14v9a4 4 0 0 1-4 4H7a4 4 0 0 1-4-4V8z" stroke="currentColor" stroke-width="1.5"/>
          </svg>
          <p>No images cleaned yet</p>
        </div>
      </div>
    </div>

  </div><!-- /screens-wrapper -->
  </div><!-- /app -->
  <script src="popup.js"></script>
</body>
</html>
